<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Ecommerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="skeleton-block header">
            <div class="header-brand skeleton-line"></div>
            <nav class="header-nav" aria-label="Navigation principale">
                <span class="skeleton-line nav-item"></span>
                <span class="skeleton-line nav-item"></span>
                <span class="skeleton-line nav-item"></span>
                <span class="skeleton-line nav-item"></span>
            </nav>
            <div class="header-actions">
                <span class="skeleton-pill"></span>
                <span class="skeleton-pill"></span>
            </div>
        </header>

        <main>
            <section class="skeleton-block hero" aria-label="Banniere d accueil">
                <div class="skeleton-line hero-title"></div>
                <div class="skeleton-line hero-subtitle"></div>
                <div class="skeleton-button"></div>
            </section>

            <section class="products" aria-label="Defilement horizontal automatique des produits">
                <div class="section-head">
                    <div class="skeleton-line section-title"></div>
                    <div class="skeleton-line section-link"></div>
                </div>

                <div class="carousel-window">
                    <div class="carousel-track">
                        <article class="product-card skeleton-block" aria-label="Card produit 1">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-label="Card produit 2">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-label="Card produit 3">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-label="Card produit 4">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-hidden="true">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-hidden="true">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-hidden="true">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>

                        <article class="product-card skeleton-block" aria-hidden="true">
                            <div class="skeleton-media"></div>
                            <div class="skeleton-line card-title"></div>
                            <div class="skeleton-line card-price"></div>
                            <div class="skeleton-button card-button"></div>
                        </article>
                    </div>
                </div>
            </section>
        </main>

        <footer class="skeleton-block footer" aria-label="Pied de page">
            <div class="skeleton-line footer-line"></div>
            <div class="skeleton-line footer-line short"></div>
        </footer>
    </div>
</body>
</html>
